spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  mvc:
    async:
      request-timeout: 600000
    contentnegotiation:
      favor-parameter: true

  application:
    name: booklore-api

  datasource:
    url: jdbc:mysql://localhost:3306/ebook_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ebook_admin
    password: ebook_123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 500
          order_inserts: true

  mail:
    host: smtp.163.com
    port: 465
    username: 13215675728@163.com
    password: SYf6TTheqrBEX9QW
    protocol: smtps
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.starttls.enable: false
      mail.smtp.starttls.required: false

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
    listener:
      simple:
        acknowledge-mode: manual

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: note-sharing-recommend
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  data:
    redis:
      host: 172.24.198.86
      port: 6379
      database: 0
    mongodb:
      uri: mongodb://localhost:27017/note_db
    elasticsearch:
      repositories:
        enabled: true
      # 禁用自动索引创建，避免启动时连接失败
      auto-index: false
      # 连接超时设置
      connection-timeout: 5s
      socket-timeout: 60s

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-migration-naming: true
    schemas: ebook_platform

jwt:
  secret: Fs9K2nKqP9zqD82jsk29Ahd92nDkQ8snf7P2jS8KfD8=
  expiration: 3600

# MinIO 对象存储（文件上传）
# 默认账户需与 scripts/backend-deps/config.ps1 启动的 MinIO 一致。
# Web 控制台: http://127.0.0.1:9005  |  API: http://localhost:9000
minio:
  endpoint: http://localhost:9000
  access-key: name
  secret-key: password
  bucket: notesharing

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    default-statement-timeout: 600
  type-aliases-package: com.project.login.model

elasticsearch:
  host: localhost
  port: 9200
  scheme: http

# ModelScope API 配置
modelscope:
  base-url: https://api-inference.modelscope.cn/v1
  api:
    key: "ms-3746afb4-3d97-4748-a356-774a71525f47"
  model: Qwen/Qwen2.5-7B-Instruct

# 敏感词扫描配置
sensitive:
  scan:
    chunk-size: 4000        # 长文本分块大小（字符数）
    concurrency: 4          # 并发审查线程数
  keywords:
    path: ""                 # 外部敏感词文件路径（可选，留空则使用classpath下的文件）

recommendation:
  feed:
    max-recall-per-source: 250
    seen-ttl-days: 14
    recent-action-size: 200
    diversity-per-source-limit: 6
    freshness-half-life-hours: 12.0
    freshness-boost-max: 1.2
    note-mix-ratio: 0.7
    min-question-count: 3
    min-note-count: 10
  infra:
    topic:
      behavior: rec_user_behavior
      search: rec_user_search
      exposure: rec_user_exposure
      content: rec_content_event
    event:
      legacy-redis-stream-enabled: false
    redis:
      fused-profile-key-prefix: "user_fused_profile:"
      recent-search-terms-key-prefix: "user_recent_search_terms:"
      recent-actions-key-prefix: "user_recent_actions:"
      seen-items-key-prefix: "user_seen_items:"
      hot-notes-key: hot_notes
      item-realtime-stats-key-prefix: "item_realtime_stats:"
    milvus:
      enabled: true
      host: localhost
      port: 19530
      collection-name: recommend_item_vectors
      top-k: 60
      vector-dim: 128
    onnx:
      enabled: false
      model-path: models/recommend_coarse_rank.onnx
    triton:
      enabled: true
      endpoint: http://localhost:8000
      model-name: recommend_coarse_rank
      timeout-millis: 800
    mlflow:
      tracking-uri: http://localhost:5001
    feast:
      enabled: true
      repo-path: recommendation_offline/feast_repo
      server-url: http://localhost:6566
      timeout-millis: 800
      user-feature-service: user_features
      item-feature-service: item_features
  experiment:
    enabled: true
    experiment-id: recommend_rank_v1
    model-rank-ratio: 0.0
    control-variant: control_rule
    treatment-variant: treatment_model
    default-model-version: pending
    state-file: data/pipeline/rollout_state.json
    auto-rollback-error-rate-threshold: 0.05
  mlops:
    service-url: http://localhost:8090
    timeout-millis: 3000
    model-name: recommend_coarse_rank
    model-type: lightgbm
